name: automate-build-deploy

on:
  push:
    branches: [main]

# Grants the action permission to push the compiled code to the gh-pages branch
permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
           node-version: '22.x'
           cache: 'npm'
           
      - name: Install Dependencies
        run: npm ci
        
      - name: Build React App
        run: npm run build
        
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
      - name: Deploy Script
        run: npm run deploy
